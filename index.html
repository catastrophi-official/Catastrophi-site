<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catastrophi</title>
  <meta name="description" content="Catastrophi.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph for link previews -->
  <meta property="og:title" content="Catastrophi">
  <meta property="og:description" content="Catastrophi.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://catastrophi.com">

  <!-- Favicon (replace with your cat-bomb mark) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .wordmark {
      width: 60%;
      max-width: 720px;
      min-width: 280px;
      height: auto;
      display: block;
    }

    .tm {
      position: absolute;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    .copyright {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      font-weight: 400;
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      .wordmark {
        width: 75%;
      }

      .copyright {
        font-size: 8px;
        bottom: 20px;
      }
    }

    @media (max-width: 380px) {
      .wordmark {
        width: 80%;
      }
    }

    /* Respect users who prefer reduced motion (no-op now, future-proofing) */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 
      REPLACE THIS IMG TAG WITH YOUR EXPORTED SVG WORDMARK.
      Either:
      (a) Save your Illustrator-exported SVG as wordmark.svg in the same folder, then use:
          <img src="wordmark.svg" alt="Catastrophi" class="wordmark">
      (b) Or paste the SVG code inline directly (preferred for crispness):
          <svg class="wordmark" viewBox="..." xmlns="...">
            [your SVG paths here]
          </svg>
    -->
    <img src="wordmark.svg" alt="Catastrophi" class="wordmark">
  </div>

  <p class="copyright">© Catastrophi 2026</p>
</body>
</html>
